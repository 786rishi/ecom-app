server:
  port: 8090


spring:
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: false
      routes:
        - id: product-service
          uri: http://localhost:8084
          predicates:
            - Path=/products/**
          filters:
            - StripPrefix=1

