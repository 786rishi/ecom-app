server:
  port: 8090


spring:
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true   # ✅ ADD THIS
        corsConfigurations:
          '[/**]':
            allowedOrigins: "http://mcart-frontend.s3-website-us-east-1.amazonaws.com"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: false
      routes:
        - id: product-service
          uri: ${PRODUCT_SERVICE_URI}
          predicates:
            - Path=/products/**
          filters:
            - StripPrefix=1

        - id: inventory-service
          uri: ${INVENTORY_SERVICE_URI}
          predicates:
            - Path=/inventory/**
          filters:
            - StripPrefix=1

#        - id: promotion-service
#          uri: ${PROMOTION_SERVICE_URI}
#          predicates:
#            - Path=/promotions/**
#          filters:
#            - StripPrefix=1

        - id: order-service
          uri: ${ORDER_SERVICE_URI}
          predicates:
            - Path=/order/**
          filters:
            - StripPrefix=1

