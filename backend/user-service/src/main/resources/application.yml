server:
  port: 8081

spring:
  application:
    name: user-service


  datasource:
    url: ${MYSQL_URI}/userdb
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI}

  jpa:
    hibernate:
      ddl-auto: update