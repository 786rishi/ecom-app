<!DOCTYPE html>
<html>
<head>
    <title>Silent Check SSO</title>
    <script>
        // Send the current URL as the callback URL
        var callbackUrl = window.location.href;
        
        function silentCheckSsoCallback() {
            var message = {
                type: 'keycloak-silent-check-sso',
                status: 'success',
                url: callbackUrl
            };
            parent.postMessage(message, '*');
        }

        function silentCheckSsoError() {
            var message = {
                type: 'keycloak-silent-check-sso',
                status: 'error',
                url: callbackUrl
            };
            parent.postMessage(message, '*');
        }

        // Immediately send the callback with the URL
        // This prevents the url.indexOf error
        silentCheckSsoCallback();
    </script>
</head>
<body>
    Silent Check SSO
</body>
</html>
